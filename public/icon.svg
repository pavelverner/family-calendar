<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background (full bleed for maskable) -->
  <rect width="512" height="512" fill="white"/>

  <!-- Calendar card shadow -->
  <rect x="102" y="102" width="312" height="336" rx="48" fill="#16A34A" opacity="0.12"/>

  <!-- Calendar card body -->
  <rect x="96" y="96" width="312" height="336" rx="48" fill="white" stroke="#E2E8F0" stroke-width="6"/>

  <!-- Green top header -->
  <rect x="96" y="96" width="312" height="108" rx="48" fill="#16A34A"/>
  <rect x="96" y="152" width="312" height="52" fill="#16A34A"/>

  <!-- Binding rings -->
  <rect x="176" y="68" width="28" height="68" rx="14" fill="#15803D"/>
  <rect x="308" y="68" width="28" height="68" rx="14" fill="#15803D"/>

  <!-- Month label in header -->
  <text x="256" y="138" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, sans-serif" font-weight="700"
        font-size="30" fill="white" opacity="0.95">BŘEZEN</text>

  <!-- Calendar grid — row 1 -->
  <circle cx="172" cy="270" r="26" fill="#F0FDF4"/>
  <circle cx="256" cy="270" r="26" fill="#16A34A"/>
  <circle cx="340" cy="270" r="26" fill="#F0FDF4"/>

  <!-- Row 1 numbers -->
  <text x="172" y="270" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#86EFAC">23</text>
  <text x="256" y="270" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="white">24</text>
  <text x="340" y="270" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#86EFAC">25</text>

  <!-- Calendar grid — row 2 -->
  <circle cx="172" cy="348" r="26" fill="#F0FDF4"/>
  <circle cx="256" cy="348" r="26" fill="#F0FDF4"/>
  <circle cx="340" cy="348" r="26" fill="#F0FDF4"/>

  <!-- Row 2 numbers -->
  <text x="172" y="348" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#86EFAC">30</text>
  <text x="256" y="348" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#86EFAC">31</text>
  <text x="340" y="348" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#DCFCE7">1</text>

  <!-- Family color event dots on "today" cell -->
  <circle cx="242" cy="288" r="6" fill="#EA580C"/>
  <circle cx="256" cy="288" r="6" fill="#CA8A04"/>
  <circle cx="270" cy="288" r="6" fill="white" opacity="0.7"/>
</svg>
