<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Full-bleed green background (required for maskable / Android adaptive icons) -->
  <rect width="512" height="512" fill="#16A34A"/>

  <!-- Card drop-shadow for depth -->
  <rect x="96" y="120" width="328" height="294" rx="28" fill="rgba(0,0,0,0.18)"/>

  <!-- Calendar card (white) -->
  <rect x="88" y="112" width="328" height="292" rx="28" fill="white"/>

  <!-- Dark-green header -->
  <rect x="88" y="112" width="328" height="96" rx="28" fill="#14532d"/>
  <!-- fill the header bottom corners so header blends into card body -->
  <rect x="88" y="180" width="328" height="28" fill="#14532d"/>

  <!-- Binding rings -->
  <rect x="164" y="80" width="30" height="76" rx="15" fill="#86efac"/>
  <rect x="318" y="80" width="30" height="76" rx="15" fill="#86efac"/>

  <!-- "V" initial (Vernerovi) in header -->
  <text x="256" y="150"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="900" font-size="56" fill="white">V</text>

  <!--
    Heart = two overlapping circles (bumps) + downward triangle (point).
    All the same green as the background → shows as a "window" through the white card.
  -->
  <circle cx="206" cy="292" r="64" fill="#16A34A"/>
  <circle cx="306" cy="292" r="64" fill="#16A34A"/>
  <polygon points="144,318 368,318 256,408" fill="#16A34A"/>

</svg>
